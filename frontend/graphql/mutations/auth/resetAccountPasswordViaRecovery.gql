mutation ResetPasswordViaRecovery(
  $orgId: ID!
  $newAuthHash: String!
  $identityKey: String!
  $wrappedKeyring: String!
  $wrappedRecovery: String!
) {
  resetAccountPasswordViaRecovery(
    orgId: $orgId
    newAuthHash: $newAuthHash
    identityKey: $identityKey
    wrappedKeyring: $wrappedKeyring
    wrappedRecovery: $wrappedRecovery
  ) {
    orgMember {
      id
    }
  }
}

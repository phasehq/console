mutation UpdateExtIdentity(
  $id: ID!
  $name: String
  $description: String
  $trustedPrincipals: String
  $signatureTtlSeconds: Int
  $stsEndpoint: String
  $tenantId: String
  $resource: String
  $tokenNamePattern: String
  $defaultTtlSeconds: Int
  $maxTtlSeconds: Int
) {
  updateIdentity(
    id: $id
    name: $name
    description: $description
    trustedPrincipals: $trustedPrincipals
    signatureTtlSeconds: $signatureTtlSeconds
    stsEndpoint: $stsEndpoint
    tenantId: $tenantId
    resource: $resource
    tokenNamePattern: $tokenNamePattern
    defaultTtlSeconds: $defaultTtlSeconds
    maxTtlSeconds: $maxTtlSeconds
  ) {
    identity {
      id
      name
      description
      config {
        ... on AwsIamConfigType {
          trustedPrincipals
          signatureTtlSeconds
          stsEndpoint
        }
        ... on AzureEntraConfigType {
          tenantId
          resource
          allowedServicePrincipalIds
        }
      }
      tokenNamePattern
      defaultTtlSeconds
      maxTtlSeconds
    }
  }
}

mutation CreateRotatingSecretOP(
  $organisationId: ID!
  $environmentId: ID!
  $name: String!
  $description: String
  $path: String
  $provider: String!
  $authenticationId: ID!
  $config: GenericScalar!
  $keyMap: [KeyMapInput]!
  $rotationIntervalSeconds: Int!
  $revocationDelaySeconds: Int
) {
  createRotatingSecret(
    organisationId: $organisationId
    environmentId: $environmentId
    name: $name
    description: $description
    path: $path
    provider: $provider
    authenticationId: $authenticationId
    config: $config
    keyMap: $keyMap
    rotationIntervalSeconds: $rotationIntervalSeconds
    revocationDelaySeconds: $revocationDelaySeconds
  ) {
    rotatingSecret {
      id
      name
      provider
      isActive
      health
      nextRotationAt
      rotationIntervalSeconds
      revocationDelaySeconds
    }
  }
}

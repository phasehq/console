mutation UpdateRotatingSecretOP(
  $rotatingSecretId: ID!
  $name: String
  $description: String
  $rotationIntervalSeconds: Int
  $revocationDelaySeconds: Int
  $isActive: Boolean
  $config: GenericScalar
  $authenticationId: ID
) {
  updateRotatingSecret(
    rotatingSecretId: $rotatingSecretId
    name: $name
    description: $description
    rotationIntervalSeconds: $rotationIntervalSeconds
    revocationDelaySeconds: $revocationDelaySeconds
    isActive: $isActive
    config: $config
    authenticationId: $authenticationId
  ) {
    rotatingSecret {
      id
      name
      description
      isActive
      health
      nextRotationAt
      rotationIntervalSeconds
      revocationDelaySeconds
      authentication {
        id
        name
      }
    }
  }
}

query GetServiceAccounts($orgId: ID!, $id: ID) {
  serviceAccounts(orgId: $orgId, serviceAccountId: $id) {
    id
    name
    identityKey
    role {
      id
      name
      description
      color
    }
    team {
      id
      name
    }
    handlers {
      id
      wrappedKeyring
      wrappedRecovery
      user {
        self
      }
    }
    createdAt
  }
}

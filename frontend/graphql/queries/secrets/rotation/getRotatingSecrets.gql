query GetRotatingSecrets(
  $orgId: ID
  $appId: ID
  $envId: ID
  $path: String
  $secretId: ID
) {
  rotatingSecrets(
    orgId: $orgId
    appId: $appId
    envId: $envId
    path: $path
    secretId: $secretId
  ) {
    id
    name
    description
    path
    provider
    isActive
    health
    lastFailureAt
    lastFailureReason
    consecutiveFailureCount
    nextRotationAt
    rotationIntervalSeconds
    revocationDelaySeconds
    pausedRemainingSeconds
    config
    keyMap {
      id
      keyName
      keyDigest
      masked
    }
    authentication {
      id
      name
    }
    environment {
      id
      name
      app {
        id
        name
      }
    }
    activeCredential {
      id
      status
      providerCredentialId
      metadata
      createdAt
    }
    credentials {
      id
      status
      providerCredentialId
      metadata
      failureCount
      lastFailureReason
      createdAt
      expireAt
      revokedAt
    }
    events {
      id
      eventType
      metadata
      ipAddress
      createdAt
      organisationMember {
        id
        fullName
        avatarUrl
        email
      }
      serviceAccount {
        id
        name
      }
      credential {
        id
      }
    }
    createdAt
    updatedAt
  }
}

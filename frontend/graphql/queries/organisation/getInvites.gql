query GetInvites($orgId: ID!) {
  organisationInvites(orgId: $orgId) {
    id
    createdAt
    expiresAt
    invitedBy {
      email
      fullName
      self
    }
    invitedByServiceAccount {
      id
      name
    }
    inviteeEmail
    role {
      id
      name
      description
      color
    }
  }
}
